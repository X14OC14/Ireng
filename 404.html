<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>record not found</title>

  <style>
    html {
      min-height: 100%;
      background: linear-gradient(to bottom right, #111 0%, #1e1a17 50%, #2a1f1a 100%);
    }

    body {
      color: #a8a49e;
      font-family: 'Courier New', monospace;
      padding: 2rem;
      line-height: 1.6;
      max-width: 800px;
      margin: auto;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    h1 {
      font-size: 2.4rem;
      color: #ff5050;
      margin-bottom: 0.4rem;
    }

    p {
      margin-bottom: 1.2rem;
    }

    .missing {
      color: #888;
      word-break: break-all;
    }

    .missing span {
      color: #ff5050;
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px dotted #666;
    }
  </style>
</head>

<body>
  <main>
    <h1>record not found</h1>

    <p class="missing">
      missing: <span id="path"></span>
    </p>

    <p>This page never spawned.</p>

    <p><a href="/">return to archive</a></p>
  </main>

  <script>
    document.getElementById("path").textContent = location.pathname;
  </script>
</body>
</html>

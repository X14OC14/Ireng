<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base:#0A0D12;
    --bg-panel:#11151C;
    --bg-elevated:#161B24;
    --border:#232932;
    --text-primary:#E7E9ED;
    --text-secondary:#868D99;
    --text-tertiary:#565D68;
    --accent:#4C8DFF;
    --accent-soft:rgba(76,141,255,0.12);
    --accent-soft-strong:rgba(76,141,255,0.22);
    --online:#3DDC97;
    --error:#FF6B6B;
    --error-soft:rgba(255,107,107,0.10);
    --font-mono:'IBM Plex Mono', monospace;
    --font-body:'Inter', sans-serif;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    height:100%;
    background:var(--bg-base);
    color:var(--text-primary);
    font-family:var(--font-body);
  }

  body{
    display:flex;
    flex-direction:column;
    height:100vh;
    height:100dvh;
    overflow:hidden;
  }

  /* ---------- Header ---------- */
  header{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 20px;
    background:var(--bg-panel);
    border-bottom:1px solid var(--border);
    position:relative;
  }

  header::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:-1px;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity:0.5;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .brand-mark{
    font-family:var(--font-mono);
    font-size:13px;
    font-weight:600;
    letter-spacing:0.5px;
    color:var(--accent);
    background:var(--accent-soft);
    padding:4px 8px;
    border-radius:4px;
    border:1px solid var(--accent-soft-strong);
  }

  .brand-title{
    font-size:15px;
    font-weight:600;
    color:var(--text-primary);
  }

  .header-actions{
    display:flex;
    align-items:center;
    gap:16px;
  }

  .status{
    display:flex;
    align-items:center;
    gap:6px;
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-secondary);
    letter-spacing:0.5px;
  }

  .status-dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--online);
    box-shadow:0 0 0 0 rgba(61,220,151,0.5);
    animation:pulse 2s infinite;
  }

  #clearBtn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 6px 10px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s ease;
  }

  #clearBtn:hover {
    border-color: var(--error);
    color: var(--error);
    background: var(--error-soft);
  }

  #clearBtn svg {
    width: 12px;
    height: 12px;
  }

  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(61,220,151,0.45); }
    70%{ box-shadow:0 0 0 6px rgba(61,220,151,0); }
    100%{ box-shadow:0 0 0 0 rgba(61,220,151,0); }
  }

  /* ---------- Chat area ---------- */
  main{
    flex:1 1 auto;
    overflow-y:auto;
    display:flex;
    justify-content:center;
  }

  .chat-wrap{
    width:100%;
    max-width:760px;
    padding:24px 20px 12px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  /* Welcome state */
  .welcome{
    margin:auto 0;
    text-align:center;
    color:var(--text-secondary);
    padding:40px 16px;
  }

  .welcome-mark{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--accent);
    border:1px solid var(--accent-soft-strong);
    background:var(--accent-soft);
    display:inline-block;
    padding:6px 10px;
    border-radius:4px;
    margin-bottom:14px;
    letter-spacing:0.5px;
  }

  .welcome h1{
    font-size:16px;
    font-weight:600;
    color:var(--text-primary);
    margin:0 0 6px;
  }

  .welcome p{
    font-size:13px;
    line-height:1.6;
    margin:0;
    max-width:380px;
    margin-left:auto;
    margin-right:auto;
  }

  /* Message group */
  .msg{
    display:flex;
    flex-direction:column;
    max-width:84%;
  }

  .msg.user{
    align-self:flex-end;
    align-items:flex-end;
  }

  .msg.ai{
    align-self:flex-start;
    align-items:flex-start;
  }

  .msg-label{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--text-tertiary);
    margin-bottom:5px;
    padding:0 4px;
  }

  .bubble{
    font-size:14px;
    line-height:1.6;
    padding:11px 14px;
    border-radius:10px;
    white-space:pre-wrap;
    word-break:break-word;
  }

  .msg.user .bubble{
    background:var(--accent-soft);
    border:1px solid var(--accent-soft-strong);
    color:var(--text-primary);
    border-radius:10px 10px 2px 10px;
  }

  .msg.ai .bubble{
    background:var(--bg-elevated);
    border:1px solid var(--border);
    color:var(--text-primary);
    border-radius:10px 10px 10px 2px;
  }

  .msg.ai .bubble.error{
    background:var(--error-soft);
    border:1px solid rgba(255,107,107,0.3);
    color:#FFB3B3;
  }

  .msg-time{
    font-family:var(--font-mono);
    font-size:10px;
    color:var(--text-tertiary);
    margin-top:5px;
    padding:0 4px;
  }

  /* Typing indicator */
  .typing-bubble{
    display:flex;
    align-items:center;
    gap:4px;
    padding:13px 14px;
  }

  .typing-dot{
    width:5px;
    height:5px;
    border-radius:50%;
    background:var(--text-secondary);
    animation:blink 1.2s infinite;
  }

  .typing-dot:nth-child(2){ animation-delay:0.2s; }
  .typing-dot:nth-child(3){ animation-delay:0.4s; }

  @keyframes blink{
    0%, 80%, 100%{ opacity:0.25; transform:translateY(0); }
    40%{ opacity:1; transform:translateY(-2px); }
  }

  /* ---------- Input area ---------- */
  footer{
    flex:0 0 auto;
    border-top:1px solid var(--border);
    background:var(--bg-panel);
    padding:14px 20px;
    display:flex;
    justify-content:center;
  }

  .input-wrap{
    width:100%;
    max-width:760px;
    display:flex;
    align-items:flex-end;
    gap:10px;
    background:var(--bg-elevated);
    border:1px solid var(--border);
    border-radius:10px;
    padding:8px 8px 8px 14px;
    transition:border-color 0.15s ease;
  }

  .input-wrap:focus-within{
    border-color:var(--accent);
  }

  .prompt-prefix{
    font-family:var(--font-mono);
    font-size:14px;
    color:var(--accent);
    padding-bottom:9px;
    user-select:none;
  }

  textarea#chatInput{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    resize:none;
    color:var(--text-primary);
    font-family:var(--font-body);
    font-size:14px;
    line-height:1.5;
    max-height:140px;
    padding:8px 0;
  }

  textarea#chatInput::placeholder{
    color:var(--text-tertiary);
  }

  textarea#chatInput:disabled{
    opacity:0.5;
  }

  #sendBtn{
    flex:0 0 auto;
    width:38px;
    height:38px;
    border-radius:8px;
    border:none;
    background:var(--accent);
    color:#06121F;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background 0.15s ease, opacity 0.15s ease;
  }

  #sendBtn:hover:not(:disabled){
    background:#6BA0FF;
  }

  #sendBtn:disabled{
    opacity:0.4;
    cursor:not-allowed;
  }

  #sendBtn svg{ width:16px; height:16px; }

  .spinner{
    width:14px;
    height:14px;
    border-radius:50%;
    border:2px solid rgba(6,18,31,0.35);
    border-top-color:#06121F;
    animation:spin 0.7s linear infinite;
  }

  @keyframes spin{ to{ transform:rotate(360deg); } }

  .hint{
    text-align:center;
    font-family:var(--font-mono);
    font-size:10px;
    color:var(--text-tertiary);
    padding-top:8px;
    letter-spacing:0.3px;
  }

  /* ---------- Scrollbar ---------- */
  main::-webkit-scrollbar{ width:8px; }
  main::-webkit-scrollbar-track{ background:transparent; }
  main::-webkit-scrollbar-thumb{ background:var(--border); border-radius:4px; }
  main::-webkit-scrollbar-thumb:hover{ background:var(--text-tertiary); }

  /* ---------- Responsive ---------- */
  @media (max-width:560px){
    header{ padding:14px 16px; }
    .chat-wrap{ padding:18px 14px 8px; }
    footer{ padding:10px 14px 14px; }
    .msg{ max-width:90%; }
    .brand-title{ font-size:14px; }
    .header-actions{ gap:10px; }
  }

  @media (prefers-reduced-motion: reduce){
    .status-dot, .typing-dot, .spinner{ animation:none; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="brand-mark">AI</span>
    <span class="brand-title">AI Assistant</span>
  </div>
  <div class="header-actions">
    <button id="clearBtn" title="Hapus Riwayat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
      <span>CLEAR</span>
    </button>
    <div class="status">
      <span class="status-dot"></span>
      <span id="statusText">Online</span>
    </div>
  </div>
</header>

<main id="mainScroll">
  <div class="chat-wrap" id="chatWrap">
    <div class="welcome" id="welcomeState">
      <span class="welcome-mark">SISTEM SIAP</span>
      <h1>Mulai percakapan Anda</h1>
      <p>Ketik pertanyaan pada kolom di bawah untuk berbicara dengan asisten virtual.</p>
    </div>
  </div>
</main>

<footer>
  <div style="width:100%; max-width:760px; margin:0 auto;">
    <div class="input-wrap">
      <span class="prompt-prefix">›</span>
      <textarea
        id="chatInput"
        rows="1"
        placeholder="Tulis pesan Anda di sini..."
        autocomplete="off"
      ></textarea>
      <button id="sendBtn" type="button" aria-label="Kirim pesan">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="hint">ENTER UNTUK KIRIM · SHIFT+ENTER UNTUK BARIS BARU</div>
  </div>
</footer>

<script>
  /* =========================================================
     KONFIGURASI
     Ubah variabel di bawah ini untuk menyesuaikan kepribadian
     / instruksi AI sesuai kebutuhan Anda.
  ========================================================= */
  const customLogic = "Anda adalah asisten virtual profesional yang ahli di bidang teknologi dan pemrograman. Jawab dengan ringkas, jelas, dan menggunakan bahasa Indonesia yang baku.";

  const PROXY_URL = "https://my-proxy-sjob.onrender.com/api/search/openai-logic";

  /* ========================================================= */

  const chatWrap = document.getElementById('chatWrap');
  const mainScroll = document.getElementById('mainScroll');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const clearBtn = document.getElementById('clearBtn');
  const statusText = document.getElementById('statusText');

  // Variabel penampung element welcome state default
  const welcomeHTML = `
    <div class="welcome" id="welcomeState">
      <span class="welcome-mark">SISTEM SIAP</span>
      <h1>Mulai percakapan Anda</h1>
      <p>Ketik pertanyaan pada kolom di bawah untuk berbicara dengan asisten virtual.</p>
    </div>`;

  // MEMORI CACHE: Load data history dari localStorage jika ada
  let chatHistory = JSON.parse(localStorage.getItem('xiaocia_chat_history')) || [];
  let isLoading = false;

  function formatTime(dateStr){
    const date = dateStr ? new Date(dateStr) : new Date();
    return date.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
  }

  function scrollToBottom(){
    mainScroll.scrollTop = mainScroll.scrollHeight;
  }

  function removeWelcome(){
    const welcomeState = document.getElementById('welcomeState');
    if (welcomeState && welcomeState.parentNode){
      welcomeState.remove();
    }
  }

  function addMessage(role, text, isError = false, timestamp = null){
    removeWelcome();

    const msg = document.createElement('div');
    msg.className = 'msg ' + role;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'Anda' : 'AI Assistant';

    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (isError ? ' error' : '');
    bubble.textContent = text;

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = formatTime(timestamp);

    msg.appendChild(label);
    msg.appendChild(bubble);
    msg.appendChild(time);
    chatWrap.appendChild(msg);

    scrollToBottom();
    return msg;
  }

  // Ambil history cache lama saat web pertama kali dimuat
  function loadCachedChat(){
    if(chatHistory.length > 0){
      removeWelcome();
      chatHistory.forEach(chat => {
        const roleType = chat.role.toLowerCase() === 'user' ? 'user' : 'ai';
        addMessage(roleType, chat.msg, false, chat.time);
      });
    }
  }

  function showTyping(){
    removeWelcome();

    const msg = document.createElement('div');
    msg.className = 'msg ai';
    msg.id = 'typingIndicator';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'AI Assistant';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing-bubble';
    bubble.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';

    msg.appendChild(label);
    msg.appendChild(bubble);
    chatWrap.appendChild(msg);

    scrollToBottom();
  }

  function hideTyping(){
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function setLoading(state){
    isLoading = state;
    chatInput.disabled = state;
    sendBtn.disabled = state;
    sendBtn.innerHTML = state
      ? '<span class="spinner"></span>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>';
    statusText.textContent = state ? 'Memproses...' : 'Online';
  }

  // Nama creator asli dari proxy (mis. "BetaBotz") akan otomatis
  // diganti menjadi nama di bawah ini setiap kali muncul pada balasan AI.
  const overrideCreatorName = "Mafy";

  // Mengganti sebutan creator asli pada teks balasan AI dengan nama
  // di atas, tanpa peduli huruf besar/kecil maupun field "creator".
  function applyCreatorOverride(text, data){
    let result = text;
    const originalCreator = (data && typeof data === 'object') ? data.creator : null;

    if (originalCreator && typeof originalCreator === 'string'){
      const pattern = new RegExp(originalCreator.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      result = result.replace(pattern, overrideCreatorName);
    }

    return result;
  }

  // Mencoba mengambil teks balasan dari berbagai kemungkinan struktur
  // respons proxy.
  function extractReplyText(data){
    if (typeof data === 'string') return data;
    if (!data || typeof data !== 'object') return JSON.stringify(data);

    const candidates = [
      data.result, data.response, data.message, data.text,
      data.answer, data.reply, data.output,
      data?.data?.result, data?.data?.message, data?.data?.text
    ];

    for (const c of candidates){
      if (typeof c === 'string' && c.trim().length > 0) return applyCreatorOverride(c, data);
    }

    return JSON.stringify(data);
  }

  async function sendMessage(){
    const text = chatInput.value.trim();
    if (!text || isLoading) return;

    addMessage('user', text);
    chatInput.value = '';
    chatInput.style.height = 'auto';

    setLoading(true);
    showTyping();

    // PROMPT HISTORY STACKING: Gabungkan semua riwayat pesan lama agar AI ingat
    let formattedPrompt = "";
    chatHistory.forEach(chat => {
        formattedPrompt += `${chat.role}: ${chat.msg}\n`;
    });
    formattedPrompt += `User: ${text}`;

    try{
      const res = await fetch(PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          text: formattedPrompt,
          logic: customLogic
        })
      });

      if (!res.ok){
        throw new Error('Server merespons dengan status ' + res.status);
      }

      const data = await res.json();
      const replyText = extractReplyText(data);

      hideTyping();
      addMessage('ai', replyText);

      // SIMPAN KE REKORD MEMORI CACHE
      const now = new Date().toISOString();
      chatHistory.push({ role: "User", msg: text, time: now });
      chatHistory.push({ role: "AI", msg: replyText, time: now });

      // Batasi memori array biar gak kepenuhan (Maksimal 20 pesan terakhir)
      if (chatHistory.length > 20) {
          chatHistory.splice(0, 2);
      }

      // Sinkronisasikan ke LocalStorage browser
      localStorage.setItem('xiaocia_chat_history', JSON.stringify(chatHistory));

    } catch (err){
      hideTyping();
      addMessage('ai', 'Maaf, terjadi kendala saat menghubungi server. Silakan coba lagi. (' + err.message + ')', true);
    } finally {
      setLoading(false);
      chatInput.focus();
    }
  }

  // FUNGSI CLEAR HISTORY (HAPUS TOTAL)
  clearBtn.addEventListener('click', () => {
    if (chatHistory.length === 0) return;
    
    const yakin = confirm("Apakah Anda yakin ingin menghapus seluruh riwayat percakapan?");
    if (yakin) {
      chatHistory = [];
      localStorage.removeItem('xiaocia_chat_history');
      chatWrap.innerHTML = welcomeHTML;
      chatInput.focus();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });

  chatInput.addEventListener('input', () => {
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 140) + 'px';
  });

  // Eksekusi pemuatan cache saat halaman siap
  loadCachedChat();
  chatInput.focus();
</script>

</body>
</html>

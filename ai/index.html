<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI Assistant</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="ai.css">
</head>
<body>

<header>
  <div class="brand">
    <span class="brand-mark">[AI]</span>
    <span class="brand-title">Assistant</span>
  </div>
  <div class="header-actions">
    <button id="clearBtn" title="Hapus Riwayat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
      <span>Clear</span>
    </button>
    <div class="status">
      <span class="status-dot"></span>
      <span id="statusText">Online</span>
    </div>
  </div>
</header>

<main id="mainScroll">
  <div class="chat-wrap" id="chatWrap">
    <div class="welcome" id="welcomeState">
      <span class="welcome-mark">Sistem Siap</span>
      <h1>Mulai percakapan Anda</h1>
      <p>Ketik pertanyaan pada kolom di bawah untuk berbicara dengan asisten virtual.</p>
    </div>
  </div>
</main>

<footer>
  <div style="width:100%; max-width:720px; margin:0 auto;">
    <div class="input-wrap">
      <span class="prompt-prefix">&gt;</span>
      <textarea
        id="chatInput"
        rows="1"
        placeholder="Tulis pesan Anda di sini..."
        autocomplete="off"
      ></textarea>
      <button id="sendBtn" type="button" aria-label="Kirim pesan">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="hint">Enter untuk kirim &middot; Shift+Enter untuk baris baru</div>
  </div>
</footer>

<script src="custom-logic.js"></script>
<script src="ai.js"></script>
</body>
</html>
